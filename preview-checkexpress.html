<!DOCTYPE html>
<html lang="zh-CN">

    <style>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-gray-900">
        <!-- Status Bar -->

            <span class="text-[14px] font-medium">9:41</span>
            <div class="flex items-center gap-1.5">
                <div class="flex items-end gap-[2px] h-3">
                    <div class="w-[3px] h-1.5 rounded-sm bg-black"></div>
                    <div class="w-[3px] h-2 rounded-sm bg-black"></div>
                    <div class="w-[3px] h-2.5 rounded-sm bg-black"></div>
                    <div class="w-[3px] h-3 rounded-sm bg-black"></div>

                            </div>

                        <input type="text" placeholder="输入快递单号" value="SF1437829133905" class="bg-transparent flex-1 outline-none text-[14px] text-[#333] placeholder-[#999]"/>

                        <button class="whitespace-nowrap text-[14px] relative pb-2 px-1 text-[#666]">已发货</button>

                            </div>
                            <div class="text-center w-20">
                                <div class="text-[18px] font-bold text-[#333] mb-1">北京市</div>
                                <div class="text-[12px] text-[#999]">寇旭</div>
                            </div>

                        <div class="bg-[#f8f9fa] rounded-lg p-2.5 flex items-center gap-2 mb-4">

                            <button class="px-4 py-1.5 rounded-full text-[13px] bg-[#3b72ff] text-white font-medium">查看物流</button>

                                <span>运单号: SF1437829133905</span>

                                </div>
                            </div>

                                <div class="text-[18px] font-bold text-[#333] mb-1">北京市</div>

                        <div class="flex justify-end gap-2.5">
                            <button class="px-4 py-1.5 rounded-full text-[13px] bg-[#3b72ff] text-white font-medium">查看详情</button>
                        </div>
                    </div>

                    <!-- Waybill Card 3 -->
                    <div class="bg-white rounded-xl p-4 shadow-sm relative">
                        <div class="flex justify-between items-center mb-5">
                            <div class="flex items-center gap-2 text-[#666] text-[12px]">
                                <span>运单号: SF1437829133905</span>
                                <svg class="w-3 h-3 text-[#999]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>

                                集运件

                        <div class="flex justify-between items-center mb-5 px-1">
                            <div class="text-center w-20">
                                <div class="text-[18px] font-bold text-[#333] mb-1">南昌市</div>
                                <div class="text-[12px] text-[#999]">娇亭</div>
                            </div>
                            <div class="flex flex-col items-center justify-center flex-1 px-2">
                                <div class="text-[#3b72ff] text-[12px] mb-1">未入库</div>
                                <div class="w-full h-[1px] bg-[#3b72ff] relative">
                                    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-1.5 h-1.5 border-t border-r border-[#3b72ff] transform rotate-45"></div>
                                </div>
                            </div>
                            <div class="text-center w-20">
                                <div class="text-[18px] font-bold text-[#333] mb-1">北京市</div>
                                <div class="text-[12px] text-[#999]">寇旭</div>

                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            <span class="text-[12px] text-[#666]">签收时间: 2022-03-17 13:39</span>

                        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
